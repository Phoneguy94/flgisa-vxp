<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FLGISA Hero Wall</title><script src="../config.js"></script><style>:root{--stage-w:min(100vw,calc(100vh*16/9));--stage-h:min(100vh,calc(100vw*9/16));--left:calc((100vw - var(--stage-w))/2);--top:calc((100vh - var(--stage-h))/2);--chalk:#f4f1e8}*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#061326;font-family:Inter,"Segoe UI",system-ui,sans-serif;color:var(--chalk);user-select:none}body:before{content:"";position:fixed;left:var(--left);top:var(--top);width:var(--stage-w);height:var(--stage-h);background:var(--bg) center/100% 100% no-repeat}.wall{position:fixed;left:var(--left);top:var(--top);width:var(--stage-w);height:var(--stage-h);overflow:hidden}.slot{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center}.hero{left:50%;top:54%;z-index:20}.tl{left:18%;top:31%}.tr{left:82%;top:31%}.bl{left:18%;top:80%}.br{left:82%;top:80%}.card{position:relative;width:calc(var(--stage-w)*.145);aspect-ratio:864/1320;border-radius:14px;background:#f4f1e8;padding:7px;box-shadow:0 24px 48px rgba(0,0,0,.58);overflow:hidden}.hero .card{width:calc(var(--stage-w)*.30)}.photo{width:100%;height:100%;object-fit:cover;border-radius:9px}.qr{position:absolute;right:4%;bottom:3.5%;width:28%;background:#fff;border-radius:8px;padding:6px;color:#111;text-align:center}.qr img{display:block;width:100%}.qr b{display:block;font-size:10px;text-transform:uppercase}.qr em{display:block;font-size:8px;font-style:normal}.nav{position:absolute;top:54%;transform:translateY(-50%);z-index:30;width:52px;height:52px;border-radius:50%;border:1px solid rgba(88,242,166,.25);background:rgba(0,0,0,.3);color:#fff;font-size:32px}.prev{left:3%}.next{right:3%}.badge{position:absolute;right:5.5%;bottom:7%;font-size:20px;letter-spacing:.12em;color:rgba(244,241,232,.65)}.status{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:30px}.hidden{display:none!important}iframe{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:0;opacity:0}@media(max-width:900px){.tl,.tr,.bl,.br{display:none}.hero .card{width:40vw}}</style></head><body><main class="wall"><div class="slot hero" id="hero"></div><div class="slot tl" id="tl"></div><div class="slot tr" id="tr"></div><div class="slot bl" id="bl"></div><div class="slot br" id="br"></div><button class="nav prev hidden" id="prev">‹</button><button class="nav next hidden" id="next">›</button><div class="badge" id="badge">FLGISA Hero Wall</div><div class="status" id="status">Loading FLGISA images…</div></main><iframe id="source"></iframe><script>const C=window.FLGISA_CONFIG;document.body.style.setProperty('--bg',`url("${C.backgroundUrl}")`);const frame=document.getElementById('source');frame.src=C.eventWallFeedUrl;const ids=['hero','tl','tr','bl','br'],els=Object.fromEntries(ids.map(x=>[x,document.getElementById(x)])),prev=document.getElementById('prev'),next=document.getElementById('next'),status=document.getElementById('status'),badge=document.getElementById('badge');let items=[],cur=0,timer,hold;function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function scrape(){try{const d=frame.contentDocument;if(!d)return[];const seen=new Set(),out=[];for(const c of d.querySelectorAll('.card')){const p=c.querySelector('img.photo'),q=c.querySelector('.qr-overlay img'),img=p&&(p.currentSrc||p.src),qr=q&&(q.currentSrc||q.src);if(img&&!seen.has(img)){seen.add(img);out.push({img,qr})}}return out}catch(e){return[]}}function card(x){return x?`<div class="card"><img class="photo" src="${esc(x.img)}">${x.qr?`<div class="qr"><img src="${esc(x.qr)}"><b>Claim Your Photo</b><em>Plus a bonus image from 1976.</em></div>`:''}</div>`:''}function at(n){return((cur+n)%items.length+items.length)%items.length}function render(){if(!items.length)return;els.hero.innerHTML=card(items[cur]);els.tl.innerHTML=card(items[at(-1)]);els.tr.innerHTML=card(items[at(1)]);els.bl.innerHTML=card(items[at(-2)]);els.br.innerHTML=card(items[at(2)]);status.classList.add('hidden');prev.classList.toggle('hidden',items.length<2);next.classList.toggle('hidden',items.length<2);badge.textContent=`FLGISA Hero Wall · ${items.length} Images`}function restart(){clearInterval(timer);clearTimeout(hold);if(items.length>1)timer=setInterval(()=>{cur=(cur+1)%items.length;render()},15000)}function go(n){if(items.length>1){cur=at(n);render();restart()}}function refresh(){const n=scrape();if(!n.length)return;const old=new Set(items.map(x=>x.img)),fresh=items.length?n.findIndex(x=>!old.has(x.img)):-1,changed=n.length!==items.length||n.some((x,i)=>!items[i]||items[i].img!==x.img);if(!changed)return;items=n;if(fresh>=0){clearInterval(timer);cur=fresh;render();hold=setTimeout(restart,30000)}else{cur=Math.min(cur,items.length-1);render();restart()}}prev.onclick=()=>go(-1);next.onclick=()=>go(1);document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')go(-1);if(e.key==='ArrowRight')go(1)});frame.addEventListener('load',()=>setTimeout(refresh,1500));setInterval(refresh,3000);</script></body></html>
